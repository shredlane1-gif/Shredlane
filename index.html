<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060606">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Shredlane">
<style>
:root{ --bg:#060606; --card:#111111; --border:#222222; --txt:#e0e0e0; --muted:#888888; --accent:#ff3b30; --accent-rgb:255,59,48; --grn:#34c759; --red:#ff3b30; --blu:#007aff; --gry1:#1e1e1e; --gry2:#636366; } 
*{box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;} 
body{background:var(--bg); color:var(--txt); padding:16px; padding-bottom:100px;} 
.container{max-width:500px; margin:0 auto;} 
header{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;} 
h1{font-size:24px; font-weight:800; letter-spacing:-0.5px;} 
.version{font-size:10px; color:var(--muted); font-weight:400; margin-left:4px;} 
.card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px;} 
.card-title{font-size:12px; font-weight:700; text-transform:uppercase; color:var(--muted); margin-bottom:12px; letter-spacing:0.5px; display:flex; justify-content:space-between;} 
.btn{background:var(--txt); color:var(--bg); border:none; padding:12px 16px; border-radius:8px; font-size:14px; font-weight:600; width:100%; cursor:pointer; display:flex; justify-content:center; align-items:center; gap:8px; transition:opacity 0.1s;} 
.btn:active{opacity:0.8;} 
.btn-sec{background:transparent; color:var(--txt); border:1px solid var(--border);} 
.btn-danger{background:var(--accent); color:#fff;} 
.btn-group{display:grid; grid-template-columns:1fr 1fr; gap:8px;} 
.form-group{margin-bottom:12px;} 
.form-group label{display:block; font-size:12px; color:var(--muted); margin-bottom:4px; font-weight:500;} 
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:8px;} 
input,select,textarea{width:100%; background:#000; border:1px solid var(--border); border-radius:6px; padding:10px; color:#fff; font-size:15px;} 
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--gry2);} 
.nav-bar{position:fixed; bottom:0; left:0; right:0; background:rgba(17,17,17,0.9); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 0; backdrop-filter:blur(10px); z-index:100;} 
.nav-item{color:var(--muted); text-decoration:none; display:flex; flex-direction:column; align-items:center; font-size:10px; font-weight:500; cursor:pointer; background:none; border:none; width:20%;} 
.nav-item svg{width:22px; height:22px; margin-bottom:2px; fill:currentColor;} 
.nav-item.active{color:var(--txt);} 
.view{display:none;} .view.active{display:block;} 
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;} 
.stat-val{font-size:22px; font-weight:700; margin-top:2px;} 
.stat-lbl{font-size:11px; color:var(--muted);} 
.chk-item{display:flex; justify-content:between; align-items:center; border-bottom:1px solid var(--border); padding:10px 0;} 
.chk-item:last-child{border:none;} 
.chk-meta{flex-grow:1;} 
.chk-date{font-size:14px; font-weight:600;} 
.chk-stats{font-size:12px; color:var(--muted); margin-top:2px;} 
.chk-actions{display:flex; gap:12px;} 
.action-btn{background:none; border:none; color:var(--muted); cursor:pointer; padding:4px;} 
.action-btn:active{color:var(--txt);} 
.progress-container{width:100%; height:8px; background:var(--border); border-radius:4px; margin:8px 0;} 
.progress-bar{height:100%; background:var(--grn); border-radius:4px; width:0%; transition:width 0.3s;}
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>Shredlane <span class="version">v2.0</span></h1>
    </header>

    <div id="view-dashboard" class="view active">
        <div class="card">
            <div class="card-title">Progress Overview</div>
            <div id="weight-badge" style="font-size:14px; color:var(--grn); margin-bottom:10px; font-weight:600;"></div>
            <div class="form-group">
                <label>Steps Progress (10k Goal)</label>
                <div class="progress-container"><div id="steps-bar" class="progress-bar"></div></div>
            </div>
            <div class="stat-grid">
                <div><div class="stat-lbl">Latest Weight</div><div id="stat-weight" class="stat-val">-</div></div>
                <div><div class="stat-lbl">Avg Sleep</div><div id="stat-sleep" class="stat-val">-</div></div>
            </div>
        </div>
        <div id="history-list"></div>
        <div style="margin-top:20px;">
            <button class="btn btn-sec" onclick="exportCSV()">Export to CSV (Send Data)</button>
        </div>
    </div>

    <div id="view-entry" class="view">
        <div class="card">
            <div class="card-title">Log Today's Metrics</div>
            <div class="form-group"><label>Body Weight (kg)</label><input type="number" id="in-weight" step="0.1"></div>
            <div class="form-row">
                <div class="form-group"><label>Steps</label><input type="number" id="in-steps"></div>
                <div class="form-group"><label>Sleep (hrs)</label><input type="number" id="in-sleep" step="0.5"></div>
            </div>
            
            <div class="form-group"><label>Habits</label>
                <div class="btn-group">
                    <button type="button" class="btn btn-sec" id="hab-protein" onclick="toggleHabit('protein')">Protein Floor: No</button>
                    <button type="button" class="btn btn-sec" id="hab-workout" onclick="toggleHabit('workout')">Workout: No</button>
                </div>
            </div>

            <div class="form-group"><label>Water Intake</label>
                <div style="display:flex; gap:10px; align-items:center; justify-content:center;">
                    <button type="button" class="btn btn-sec" style="width:50px" onclick="changeWater(-1)">-</button>
                    <span id="water-count" style="font-weight:700; font-size:18px;">0</span>
                    <button type="button" class="btn btn-sec" style="width:50px" onclick="changeWater(1)">+</button>
                </div>
            </div>

            <button class="btn" onclick="saveEntry()">Commit Entry</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Quick Actions</div>
        <div class="btn-group">
            <a href="https://wa.me/YOUR_NUMBER" class="btn btn-sec" style="text-decoration:none; font-size:12px;">WhatsApp</a>
            <a href="https://forms.gle/YOUR_FORM_LINK" class="btn btn-sec" style="text-decoration:none; font-size:12px;">Weekly Form</a>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showView('dashboard')">Dashboard</button>
    <button class="nav-item" onclick="showView('entry')">Entry</button>
</nav>

<script>
    let state = {
        entries: JSON.parse(localStorage.getItem('shred_data') || '[]'),
        water: 0,
        habits: { protein: false, workout: false }
    };

    function showView(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        event.currentTarget.classList.add('active');
        if(v === 'dashboard') updateDashboard();
    }

    function toggleHabit(h) {
        state.habits[h] = !state.habits[h];
        document.getElementById('hab-' + h).innerText = (h === 'protein' ? 'Protein Floor: ' : 'Workout: ') + (state.habits[h] ? 'Yes' : 'No');
    }

    function changeWater(n) {
        state.water = Math.max(0, state.water + n);
        document.getElementById('water-count').innerText = state.water;
    }

    function saveEntry() {
        const entry = {
            date: new Date().toISOString().split('T')[0],
            weight: document.getElementById('in-weight').value,
            steps: parseInt(document.getElementById('in-steps').value) || 0,
            sleep: document.getElementById('in-sleep').value,
            water: state.water,
            habits: {...state.habits}
        };
        state.entries.unshift(entry);
        localStorage.setItem('shred_data', JSON.stringify(state.entries));
        alert('Entry Saved!');
        showView('dashboard');
    }

    function updateDashboard() {
        const h = state.entries;
        if(h.length > 0) {
            document.getElementById('stat-weight').innerText = h[0].weight + 'kg';
            document.getElementById('stat-sleep').innerText = h[0].sleep + 'h';
            
            // Feature 4: Progress Bars
            const stepPercent = Math.min(100, (h[0].steps / 10000) * 100);
            document.getElementById('steps-bar').style.width = stepPercent + '%';
            
            const startWeight = h[h.length-1].weight;
            const currentWeight = h[0].weight;
            const lost = (startWeight - currentWeight).toFixed(1);
            document.getElementById('weight-badge').innerText = lost > 0 ? `🔥 You have lost ${lost}kg so far!` : "Keep pushing!";
        }
    }

    // Feature 5: Export CSV
    function exportCSV() {
        let csv = "Date,Weight,Steps,Sleep,Water,Protein,Workout\n";
        state.entries.forEach(e => {
            csv += `${e.date},${e.weight},${e.steps},${e.sleep},${e.water},${e.habits.protein},${e.habits.workout}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'shredlane_data.csv';
        a.click();
    }

    updateDashboard();
</script>
</body>
</html>
