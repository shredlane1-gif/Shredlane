<script>
// ═══════════════════════════════════════
// DATABASE LAYER (LOCALSTORAGE ENGINE)
// ═══════════════════════════════════════
const ADMIN_EMAIL = 'coach@shredlane.com';

function gDB() {
  let d = localStorage.getItem('shredlane_db');
  if(!d) {
    d = {
      users: {
        'coach@shredlane.com': { name: 'Coach / Admin', email: 'coach@shredlane.com', pass: 'coach123', status: 'approved', isAdmin: true }
      },
      checkins: {}
    };
    localStorage.setItem('shredlane_db', JSON.stringify(d));
    return d;
  }
  return JSON.parse(d);
}

function sDB(d) {
  localStorage.setItem('shredlane_db', JSON.stringify(d));
}

let cUser = null;

window.addEventListener('DOMContentLoaded', () => {
  gDB(); // Initialize
  document.getElementById('log-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  
  const saved = localStorage.getItem('shredlane_session');
  if(saved) {
    const d = gDB();
    if(d.users[saved]) {
      cUser = d.users[saved];
      onLoginSuccess();
    }
  }
});

// ═══════════════════════════════════════
// VIEW CONTROLLER
// ═══════════════════════════════════════
function switchPage(pId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  
  const targetPage = document.getElementById(`page-${pId}`);
  if(targetPage) targetPage.classList.add('active');
  
  const btnIdx = { 'home': 0, 'log': 1, 'history': 2, 'admin': 3 };
  const navItems = document.querySelectorAll('.nav-item');
  if(btnIdx[pId] !== undefined && navItems[btnIdx[pId]]) {
    navItems[btnIdx[pId]].classList.add('active');
  }

  if(pId === 'home') renderHome();
  if(pId === 'history') renderHistory();
  if(pId === 'admin') renderAdmin();
}

function toggleAuth(showLogin) {
  document.getElementById('login-form').style.display = showLogin ? 'block' : 'none';
  document.getElementById('register-form').style.display = showLogin ? 'none' : 'block';
}

function toast(msg, type='g') {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = `toast ${type === 'g' ? 'success' : 'error'}`;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ═══════════════════════════════════════
// AUTHENTICATION CONTROLLER
// ═══════════════════════════════════════
function handleLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  
  if(!email || !pass) return toast('Please enter all fields', 'r');
  
  const d = gDB();
  const u = d.users[email];
  
  if(!u || u.pass !== pass) return toast('Invalid email or password', 'r');
  
  cUser = u;
  localStorage.setItem('shredlane_session', email);
  onLoginSuccess();
  toast('Welcome back!', 'g');
}

function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim().toLowerCase();
  const pass = document.getElementById('reg-pass').value;
  
  if(!name || !email || !pass) return toast('Please enter all fields', 'r');
  if(pass.length < 6) return toast('Password must be at least 6 characters', 'r');
  
  const d = gDB();
  if(d.users[email]) return toast('Email already registered', 'r');
  
  d.users[email] = {
    name, email, pass,
    status: email === ADMIN_EMAIL ? 'approved' : 'pending',
    isAdmin: email === ADMIN_EMAIL
  };
  d.checkins[email] = [];
  
  sDB(d);
  cUser = d.users[email];
  localStorage.setItem('shredlane_session', email);
  onLoginSuccess();
  toast('Account created!', 'g');
}

function onLoginSuccess() {
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('main-nav').style.display = 'flex';
  document.getElementById('user-greeting').innerText = `Hey, ${cUser.name.split(' ')[0]}!`;
  
  if(cUser.isAdmin) {
    document.getElementById('nav-admin-btn').style.display = 'flex';
  } else {
    document.getElementById('nav-admin-btn').style.display = 'none';
  }
  switchPage('home');
}

function handleLogout() {
  cUser = null;
  localStorage.removeItem('shredlane_session');
  document.getElementById('main-nav').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-auth').classList.add('active');
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
}

// ═══════════════════════════════════════
// CORE BUSINESS LOGIC (CHECK-INS)
// ═══════════════════════════════════════
function submitCheckin() {
  const date = document.getElementById('log-date').value;
  const weight = document.getElementById('log-weight').value;
  const waist = document.getElementById('log-waist').value;
  const steps = document.getElementById('log-steps').value;
  const sleep = document.getElementById('log-sleep').value;
  const hunger = document.getElementById('log-hunger').value;
  const notes = document.getElementById('log-notes').value.trim();
  
  if(!date || !weight || !waist) return toast('Date, Weight, and Waist are mandatory', 'r');
  
  const d = gDB();
  if(!d.checkins[cUser.email]) d.checkins[cUser.email] = [];
  
  const existingIdx = d.checkins[cUser.email].findIndex(c => c.date === date);
  const logData = {
    date,
    weight: parseFloat(weight),
    waist: parseFloat(waist),
    steps: steps ? parseInt(steps) : null,
    sleep: sleep ? parseFloat(sleep) : null,
    hunger: parseInt(hunger),
    notes: notes || null
  };
  
  if(existingIdx > -1) {
    d.checkins[cUser.email][existingIdx] = logData;
  } else {
    d.checkins[cUser.email].push(logData);
  }
  
  d.checkins[cUser.email].sort((a,b) => new Date(b.date) - new Date(a.date));
  sDB(d);
  
  toast('💪 Daily data logged safely!', 'g');
  document.getElementById('log-notes').value = '';
  switchPage('home');
}

// ═══════════════════════════════════════
// RENDERING MODULES
// ═══════════════════════════════════════
function renderHome() {
  const d = gDB();
  const uObj = d.users[cUser.email];
  
  document.getElementById('user-status-badge').innerText = uObj.status;
  document.getElementById('user-status-badge').className = `badge ${uObj.status}`;
  document.getElementById('pending-alert').style.display = uObj.status === 'pending' ? 'block' : 'none';
  
  const logs = d.checkins[cUser.email] || [];
  if(logs.length > 0) {
    const latest = logs[0];
    document.getElementById('stat-wt').innerText = latest.weight ? latest.weight + 'kg' : '-';
    document.getElementById('stat-waist').innerText = latest.waist ? latest.waist + 'in' : '-';
    document.getElementById('stat-steps').innerText = latest.steps ? latest.steps.toLocaleString() : '-';
  } else {
    document.getElementById('stat-wt').innerText = '-';
    document.getElementById('stat-waist').innerText = '-';
    document.getElementById('stat-steps').innerText = '-';
  }
  
  const feedCont = document.getElementById('community-feed');
  feedCont.innerHTML = '';
  
  let masterFeed = [];
  Object.keys(d.checkins).forEach(email => {
    if(d.users[email] && d.users[email].status === 'approved') {
      d.checkins[email].forEach(log => {
        masterFeed.push({ uName: d.users[email].name, ...log });
      });
    }
  });
  
  masterFeed.sort((a,b) => new Date(b.date) - new Date(a.date));
  
  if(masterFeed.length === 0) {
    feedCont.innerHTML = `<p class="text-dim text-center" style="padding:20px 0;">No logs in the pipeline yet...</p>`;
    return;
  }
  
  masterFeed.slice(0,15).forEach(f => {
    const row = document.createElement('div');
    row.className = 'checkin-row';
    row.innerHTML = `
      <div style="flex:1; padding-right:8px;">
        <span style="font-weight:600; color:#fff;">${f.uName}</span>
        <span style="font-size:11px; color:var(--txt-dim); margin-left:6px;">${f.date}</span>
        <div style="margin-top:4px; font-size:12px; color:#ddd;">
          Wt: <strong>${f.weight}kg</strong> · Waist: <strong>${f.waist}in</strong> 
          ${f.steps ? `· Steps: <strong>${f.steps.toLocaleString()}</strong>` : ''}
          ${f.sleep ? `· Sleep: <strong>${f.sleep}h</strong>` : ''}
          · Hunger: <strong>${f.hunger}/10</strong>
        </div>
        ${f.notes ? `<div style="margin-top:4px; font-size:12px; color:var(--txt-dim); font-style:italic;">"${f.notes}"</div>` : ''}
      </div>
    `;
    feedCont.appendChild(row);
  });
}

function renderHistory() {
  const d = gDB();
  const logs = d.checkins[cUser.email] || [];
  const listCont = document.getElementById('history-list');
  listCont.innerHTML = '';
  
  if(logs.length === 0) {
    listCont.innerHTML = `<p class="text-dim text-center" style="padding:20px 0;">No check-ins generated yet.</p>`;
    return;
  }
  
  logs.forEach((c, idx) => {
    const div = document.createElement('div');
    div.className = 'checkin-row';
    
    let wDiff = null, waDiff = null;
    if(idx < logs.length - 1) {
      const prev = logs[idx + 1];
      wDiff = (c.weight - prev.weight).toFixed(1);
      waDiff = (c.waist - prev.waist).toFixed(1);
    }
    
    div.innerHTML = `
      <div style="flex:1;">
        <div class="flex-between">
          <strong style="color:#fff; font-size:14px;">${c.date}</strong>
          <span style="font-size:12px; color:var(--txt-dim)">Hunger: ${c.hunger}/10</span>
        </div>
        <div style="margin-top:4px; font-size:13px;">
          Weight: <strong>${c.weight}kg</strong> 
          ${wDiff !== null ? `<span style="font-size:11px; color:${parseFloat(wDiff)<=0?'var(--grn)':'var(--red)'}">(${parseFloat(wDiff)>0?'+':''}${wDiff})</span>` : ''}
          · Waist: <strong>${c.waist}in</strong>
          ${waDiff !== null ? `<span style="font-size:11px; color:${parseFloat(waDiff)<=0?'var(--grn)':'var(--red)'}">(${parseFloat(waDiff)>0?'+':''}${waDiff})</span>` : ''}
        </div>
        <div style="margin-top:2px; font-size:12px; color:var(--txt-dim);">
          Steps: ${(c.steps || 0).toLocaleString()} · Sleep: ${c.sleep || 0}h
        </div>
        ${c.notes ? `<div style="margin-top:4px; font-size:12px; color:#aaa; background:#000; padding:4px 8px; border-radius:4px;">${c.notes}</div>` : ''}
      </div>
    `;
    listCont.appendChild(div);
  });
}

function renderAdmin() {
  const d = gDB();
  const rosterCont = document.getElementById('admin-roster');
  rosterCont.innerHTML = '';
  
  Object.keys(d.users).forEach(email => {
    const u = d.users[email];
    if(u.isAdmin) return; 
    
    const uLogs = d.checkins[email] || [];
    const last = uLogs[0];
    
    let wDiff = null, waDiff = null;
    if(uLogs.length > 1) {
      wDiff = (last.weight - uLogs[1].weight).toFixed(1);
      waDiff = (last.waist - uLogs[1].waist).toFixed(1);
    }
    
    const card = document.createElement('div');
    card.className = 'admin-user-card';
    card.innerHTML = `
      <div class="admin-user-header">
        <div>
          <strong style="color:#fff; font-size:15px;">${u.name}</strong><br>
          <span style="font-size:11px; color:var(--txt-dim)">${u.email}</span>
        </div>
        <div>
          ${u.status === 'pending' ? 
            `<button class="btn" style="padding:4px 8px; font-size:11px; width:auto; display:inline-block;" onclick="approveUser('${u.email}')">Approve</button>` : 
            `<span class="badge approved">Active</span>`
          }
          <button class="btn btn-danger" style="padding:4px 8px; font-size:11px; width:auto; display:inline-block; margin-left:4px;" onclick="rejectUser('${u.email}')">Remove</button>
        </div>
      </div>
      ${last ? `<div class="mc-last">
        Last: ${last.date} · Wt: <strong style="color:${wDiff&&parseFloat(wDiff)<0?'var(--grn)':'var(--red)'}">${last.weight}kg${wDiff!==null?' ('+(parseFloat(wDiff)>0?'+':'')+wDiff+')':''}</strong> · Waist: <strong style="color:${waDiff&&parseFloat(waDiff)<0?'var(--grn)':'var(--red)'}">${last.waist}in${waDiff!==null?' ('+(parseFloat(waDiff)>0?'+':'')+waDiff+')':''}</strong> · Steps: ${(last.steps||0).toLocaleString()} · Sleep: ${last.sleep}h · Hunger: ${last.hunger}/10
        ${last.notes?`<br><em style="color:var(--txt-dim);font-style:italic">\"${last.notes}\"</em>`:''}
      </div>`:''}
    </div>`;
    rosterCont.appendChild(card);
  });
}

function approveUser(email){
  const d = gDB();
  if(d.users[email]){ d.users[email].status = 'approved'; sDB(d); }
  toast('✅ ' + email + ' approved', 'g');
  renderAdmin();
}

function rejectUser(email){
  if(!confirm('Remove ' + email + ' from the community?')) return;
  const d = gDB();
  delete d.users[email];
  delete d.checkins[email];
  sDB(d);
  toast('Removed ' + email, 'r');
  renderAdmin();
}

// ═══════════════════════════════════════
// DATA EXPORTER
// ═══════════════════════════════════════
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const d = gDB();
  const logs = d.checkins[cUser.email] || [];
  
  doc.setFont('Helvetica','bold');doc.setFontSize(22);doc.setTextColor(20,20,20);
  doc.text('SHREDLANE PERFORMANCE AUDIT',14,20);
  doc.setFont('Helvetica','normal');doc.setFontSize(10);doc.setTextColor(120,120,120);
  doc.text(`Athlete: ${cUser.name}  |  Generated: ${new Date().toLocaleDateString()}`,14,26);
  doc.line(14,30,196,30);

  let y = 40;
  if(logs.length === 0){
    doc.text('No matching data sequences recorded.',14,y);
  } else {
    doc.setFont('Helvetica','bold');doc.setFontSize(9);doc.setTextColor(100,100,100);
    doc.text('Date',14,y);doc.text('Wt(kg)',54,y);doc.text('Waist(in)',78,y);doc.text('Steps',106,y);doc.text('Sleep',130,y);doc.text('Hunger',152,y);doc.text('Notes',176,y);
    y+=3;doc.line(14,y,196,y);y+=6;doc.setTextColor(20,20,20);doc.setFont('Helvetica','normal');
    
    logs.forEach((c, i) => {
      if(y > 275){
        doc.addPage();y=20;
        doc.setFont('Helvetica','bold');doc.setFontSize(9);doc.setTextColor(100,100,100);
        doc.text('Date',14,y);doc.text('Wt(kg)',54,y);doc.text('Waist(in)',78,y);doc.text('Steps',106,y);doc.text('Sleep',130,y);doc.text('Hunger',152,y);doc.text('Notes',176,y);
        y+=3;doc.line(14,y,196,y);y+=6;doc.setTextColor(20,20,20);
      }
      if(i%2===1){doc.setFillColor(248,248,248);doc.rect(12,y-4,184,6,'F');}
      doc.text(String(c.date),14,y);
      doc.text(String(c.weight??''),54,y);
      doc.text(String(c.waist??''),78,y);
      doc.text(String((c.steps||0).toLocaleString()),106,y);
      doc.text(String(c.sleep??''),130,y);
      doc.text(String(c.hunger??''),152,y);
      const notes=(c.notes||'').slice(0,28);
      doc.text(notes,176,y);
      y+=6;
    });
  }

  doc.setFontSize(8);
  doc.setTextColor(150,150,150);
  doc.text('Shredlane tracking app — Keep crushing your constraints.', 14, 288);
  doc.save(`shredlane_audit_${cUser.name.toLowerCase().replace(/\s+/g, '_')}.pdf`);
}
</script>
</body>
</html>
